<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SajaWarga Terminal</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000' rx='20'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='%236ee7b7' font-family='monospace'>&gt;_</text></svg>">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="terminal-window">
        <!-- Title Bar - Hanya judul di tengah -->
        <div class="title-bar">
            <div class="window-title">sajawarga@terminal:~</div>
        </div>
        
        <!-- Tab Bar - Tanpa tombol New Tab -->
        <div class="tab-bar">
            <div class="tab active">
                <i class="fas fa-terminal"></i>
                <span>bash</span>
                <button class="tab-close">&times;</button>
            </div>
        </div>
        
        <!-- Terminal Content -->
        <div class="terminal-container">
            <div class="terminal-output" id="terminalOutput">
                <div class="output-line">
                    <span class="prompt">$</span>
                    <span class="command">./sajawarga --ready</span>
                </div>
                <div class="output-line welcome-msg">
                    <span class="prompt">→</span>
                    <span class="message">Selamat datang di SajaWarga Terminal</span>
                </div>
                <div class="output-line welcome-stats">
                    <span class="prompt">→</span>
                    <span class="message"><i class="fas fa-database"></i> 7.5M+ artikel &nbsp;|&nbsp; <i class="fas fa-globe"></i> 2 bahasa (ID/EN) &nbsp;|&nbsp; <i class="fas fa-lock"></i> 100% privat</span>
                </div>
                <div class="output-line welcome-msg">
                    <span class="prompt">→</span>
                    <span class="message">Ketik <kbd>help</kbd> untuk melihat daftar perintah</span>
                </div>
                <div id="dynamicOutput"></div>
            </div>
            <div class="input-line">
                <span class="input-prompt">$</span>
                <input type="text" id="terminalInput" class="terminal-input" autocomplete="off" spellcheck="false" placeholder="">
                <button id="enterBtn" class="enter-btn">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <i class="fas fa-circle" style="color: #6ee7b7; font-size: 8px;"></i>
                <span>READY</span>
            </div>
            <div class="status-center">
                <span>UTF-8</span>
                <span>|</span>
                <span>bash</span>
                <span>|</span>
                <span>80x24</span>
            </div>
            <div class="status-right" id="liveTime">
                --:--
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
